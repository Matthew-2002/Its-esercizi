<!doctype html>

<html>

	<head>
		<title>Table Tutorial</title>
		<meta charset="utf-8">
	</head>


<body>

  <form name="form1" action="send.php" method="post">
  <table width="600" border="1" cellspacing="2" cellpadding="2">
      <tr>
        <td>Employment Application</td>
        <td></td>
      </tr>
      <tr>
        <td>First Name</td>
        <td><input type="text" name="fname" maxlength="50"></td>
      </tr>
      <tr>
        <td>Last Name</td>
        <td><input type="text" name="lname" maxlength="50"></td>
      </tr>
      <tr>
        <td>Position</td>
        <td>
          <select name="position">
            <option value="prAss">Professore Associato</option>
            <option value="prOrd">Professore Ordinario</option>
            <option value="ric">Ricercatore</option>
            <option value="pres">Presidente</option>
          </select></td>
      </tr>
      <tr>
        <td>Job Type</td>
        <td>
          <input type="checkbox" name="fullTime">Full Time
          <input type="checkbox" name="partTime">Part Time
          <input type="checkbox" name="contract">Contract
        </td>
      </tr>
      <tr>
        <td>Employment Status</td>
        <td>
          <input  type="radio" name="estatus" value="employed">Employed
          <input  type="radio" name="estatus" value="unemployed">Unemployed
          <input  type="radio" name="estatus" value="student">Student
        </td>
      </tr>
      <tr>
        <td>Description of you're self</td>
        <td>
          <textarea name="edescription" cols="45" rows="5">Scrivi qui</textarea>
        </td>
      </tr>
      <tr>
        <td></td>
        <td></td>
      </tr>
      <tr>
        <td></td>
        <td>
          <input type="submit" name="submit" value="Submit">
          <input type="reset" name="reset" value="Reset">
        </td>
      </tr>
    </table>
  </form>
  <iframe src="/home/its/vscode_projects/Esercizi/CorsoWeb/lezioniWebTirocinio/HTML-Required-Files/Section 2 - HTML Development/Lecture 2 - Basic Structure of a Web Page/basics.html"
    width="100%" height="50%"></iframe>

</body>
</html>
